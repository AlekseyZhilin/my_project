{% load common_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/menu_style.css' %}" type="text/css">
    <link rel="stylesheet" href="{% static 'css/stylesheet.css' %}" type="text/css">
    <title>
        {% block title %}
            {{ title }}
        {% endblock %}
    </title>
</head>
<body>
    <header>
        {% show_top_menu %}
    </header>
    <div class="container">
    {% block content %}
        {% if context %}
            {{ context }}
        {% endif %}
    {% endblock %}
    </div>
</body>
</html>
