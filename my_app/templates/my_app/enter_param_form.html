{% extends 'base.html' %}

{% block title %}
    {{ title }}
{% endblock %}

{% block content %}
    {% if message %}
        <div class="form_message">
            <h3 class="form_message"> {{ message }} </h3>
        </div>
    {% endif %}

    <div class="form_content">
        <form action="" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" class="input-button" value="Отправить">
        </form>
    </div>
{% endblock %}
