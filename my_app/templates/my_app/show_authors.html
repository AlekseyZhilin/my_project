{% extends 'base.html' %}

{% block title %}
    {{ title }}
{% endblock %}

{% block content %}
    {% if authors %}
        <table>
            {% for author in authors %}
            <tr>
                <td>{{ author.name }}</td>
                <td>{{ author.email }}</td>
                <td>{{ author.age }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <div> <p> К сожалению, авторов пока нет </p> </div>
    {% endif %}
{% endblock %}
